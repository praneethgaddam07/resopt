name: Build desktop apps

# Builds RESOPT for Mac (.app) and Windows (.exe) natively on GitHub's runners and
# publishes them to the PUBLIC downloads repo (praneethgaddam07/resopt) via the
# RELEASE_TOKEN secret (a PAT with Contents:write on resopt) — source stays private.
#
# Trigger by pushing a version tag (e.g. `git tag v2.1 && git push origin v2.1`)
# or run manually from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-desktop.txt Pillow
      - run: python packaging/make_icon.py
      - name: Build RESOPT.app
        run: |
          pyinstaller --noconfirm --windowed --name "RESOPT" \
            --icon packaging/assets/icon.icns \
            --add-data "app/static:app/static" \
            --add-data "app/workflow/master_taxonomy.json:app/workflow" \
            --collect-all uvicorn --collect-all anthropic --collect-all openai \
            --collect-all google.generativeai --collect-all webview \
            --collect-all sentence_transformers --collect-all transformers \
            --collect-all huggingface_hub --collect-all tokenizers \
            --collect-all tqdm --collect-all safetensors \
            --collect-all regex --collect-all pypdf \
            --collect-all docx --collect-all numpy \
            --collect-all scipy --collect-all sklearn \
            --collect-all torch \
            --copy-metadata packaging --copy-metadata tqdm \
            --copy-metadata regex --copy-metadata requests \
            --copy-metadata filelock --copy-metadata numpy \
            --copy-metadata tokenizers --copy-metadata huggingface-hub \
            --copy-metadata safetensors --copy-metadata pyyaml \
            --copy-metadata fsspec --copy-metadata scipy \
            --copy-metadata torch --copy-metadata pillow \
            --copy-metadata sentence-transformers --copy-metadata transformers \
            --collect-submodules app desktop.py
      - name: Smoke test (bundled server boots)
        run: "'dist/RESOPT.app/Contents/MacOS/RESOPT' --selftest"
      - name: Zip .app (ditto preserves the bundle's symlinks/permissions)
        run: ditto -c -k --keepParent dist/RESOPT.app dist/RESOPT-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: RESOPT-macOS
          path: dist/RESOPT-macOS.zip
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          repository: praneethgaddam07/resopt
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: dist/RESOPT-macOS.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-desktop.txt Pillow
      - run: python packaging/make_icon.py
      - name: Build RESOPT.exe
        run: >
          pyinstaller --noconfirm --windowed --onefile --name "RESOPT"
          --icon packaging/assets/icon.ico
          --add-data "app/static;app/static"
          --add-data "app/workflow/master_taxonomy.json;app/workflow"
          --collect-all uvicorn --collect-all anthropic --collect-all openai
          --collect-all google.generativeai --collect-all webview
          --collect-all sentence_transformers --collect-all transformers
          --collect-all huggingface_hub --collect-all tokenizers
          --collect-all tqdm --collect-all safetensors
          --collect-all regex --collect-all pypdf
          --collect-all docx --collect-all numpy
          --collect-all scipy --collect-all sklearn
          --collect-all torch
          --copy-metadata packaging --copy-metadata tqdm
          --copy-metadata regex --copy-metadata requests
          --copy-metadata filelock --copy-metadata numpy
          --copy-metadata tokenizers --copy-metadata huggingface-hub
          --copy-metadata safetensors --copy-metadata pyyaml
          --copy-metadata fsspec --copy-metadata scipy
          --copy-metadata torch --copy-metadata pillow
          --copy-metadata sentence-transformers --copy-metadata transformers
          --collect-submodules app desktop.py
      - name: Smoke test (bundled server boots)
        run: dist\RESOPT.exe --selftest
      - uses: actions/upload-artifact@v4
        with:
          name: RESOPT-Windows
          path: dist/RESOPT.exe
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          repository: praneethgaddam07/resopt
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          files: dist/RESOPT.exe
