# One-click deploy to Render (free tier). Deploys ONLY the RESOPT MCP connector.
# (The BYO-key website still lives in this repo but is not deployed by this blueprint.)
#
# Users add this endpoint to Claude / ChatGPT / Perplexity:
#     https://<this-service>.onrender.com/mcp
# After the first deploy, set RESOPT_PUBLIC_URL to this service's own https URL
# so the generated .docx download links resolve.
services:
  - type: web
    name: resopt-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-mcp.txt
    startCommand: uvicorn mcp_server:http_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: RESOPT_PUBLIC_URL
        sync: false  # set to https://resopt-mcp-XXXX.onrender.com after first deploy
